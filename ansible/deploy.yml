---
- hosts: servers
  become: true

  tasks:

  - name: Pull latest Docker image
    command: docker pull ayush81080/calculator:latest

  - name: Stop existing calculator container
    command: docker stop calculator
    ignore_errors: yes

  - name: Remove old calculator container
    command: docker rm calculator
    ignore_errors: yes

  - name: Run new calculator container
    command: docker run -dit --name calculator ayush81080/calculator:latest
